name: Lighthouse CI Performance Testing

on:
  push:
    branches: [main] # Atau branch lain yang Anda gunakan

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout Code
      - uses: actions/checkout@v4
      
      # 2. Deploy ke Netlify (Action ini otomatis menunggu sampai selesai)
      - name: Deploy to Netlify
        id: netlify_deploy # <--- PENTING: Beri ID pada step ini
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: './' 
          production-deploy: false # Tetap false agar aman saat testing
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # 3. Jalankan LHCI (Langsung pakai URL dari step sebelumnya)
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.netlify_deploy.outputs.deploy-url }} 
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json'
