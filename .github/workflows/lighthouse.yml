name: Lighthouse CI Performance Testing

on:
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout Code
      - uses: actions/checkout@v4
      
      # 2. Deploy ke Netlify (Langsung upload folder, tanpa build npm)
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: './' # Asumsi file index.html ada di root
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # 3. Tunggu Netlify Siap
      - name: Wait for Netlify
        uses: jakepartusch/wait-for-netlify-action@v1.4
        id: netlify
        with:
          site_name: '${{ secrets.NETLIFY_SITE_NAME }}' # Pastikan ini sesuai di Secrets
          max_timeout: '120'

      # 4. Jalankan LHCI
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.netlify.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json' # Pastikan file ini ada di root repo Anda
